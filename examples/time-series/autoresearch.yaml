project: "time-series-forecasting"

editable:
  - "model.py"
  - "train.py"

context:
  - "README.md"
  - "prepare.py"

metric:
  name: "val_mse"
  direction: "minimize"
  extract: "grep '^val_mse:' run.log | tail -1 | awk '{print $2}'"

run: "python train.py"
time_budget: 120

prepare: "python prepare.py"
prepare_check: "test -f data/etth1/train.pt"

dependencies: "requirements.txt"
