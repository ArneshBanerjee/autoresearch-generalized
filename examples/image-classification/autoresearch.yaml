project: "image-classification"

editable:
  - "model.py"
  - "train.py"

context:
  - "README.md"
  - "prepare.py"

metric:
  name: "val_accuracy"
  direction: "maximize"
  extract: "grep '^val_accuracy:' run.log | tail -1 | awk '{print $2}'"

run: "python train.py"
time_budget: 120

prepare: "python prepare.py"
prepare_check: "test -d data/cifar-10"

results_columns:
  - name: "memory_mb"
    extract: "grep '^peak_memory_mb:' run.log | tail -1 | awk '{print $2}'"

dependencies: "requirements.txt"
